<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Access Portal | Imperium MUN</title>
  <meta name="description" content="Imperium MUN access portal." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Imperium MUN" />
  <meta property="og:title" content="Access Portal | Imperium MUN" />
  <meta property="og:description" content="Secure access portal for Imperium MUN internal workspace." />
  <meta property="og:image" content="assets/imperium mun logo.jpg" />
  <meta property="og:image:alt" content="Imperium MUN official logo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Access Portal | Imperium MUN" />
  <meta name="twitter:description" content="Secure access portal for Imperium MUN internal workspace." />
  <meta name="twitter:image" content="assets/imperium mun logo.jpg" />
  <link rel="icon" type="image/jpeg" href="assets/imperium mun logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="access.css" />
</head>
<body>
  <div class="security-grid" aria-hidden="true"></div>
  <header class="portal-header">
    <a class="brand" href="index.html">IMPERIUM MUN</a>
    <a class="back-home" href="index.html">Back to Website</a>
  </header>

  <main class="access-main">
    <div class="access-layout">
      <section class="access-card">
        <img src="assets/imperium mun logo.jpg" alt="Imperium logo" class="portal-logo" loading="eager" decoding="async" />
        <h1>Access Portal</h1>
        <p class="subtitle">Secure login for analytics and internal applications workspace.</p>

        <form id="loginForm" class="login-form" novalidate>
          <label for="username">Username</label>
          <input id="username" name="username" type="text" autocomplete="username" required />

          <label for="password">Password</label>
          <div class="password-wrap">
            <input id="password" name="password" type="password" autocomplete="current-password" required />
            <button id="holdToViewBtn" type="button" class="hold-view" aria-label="Hold to show password" title="Hold to show password">
              👁
            </button>
          </div>
          <p id="capsLockIndicator" class="caps-indicator" aria-live="polite">Caps Lock is ON</p>

          <p id="loginMessage" class="login-message" aria-live="polite"></p>
          <button id="loginBtn" type="submit">Login</button>
        </form>

        <div class="scan-lines" aria-hidden="true"></div>
      </section>

      <aside class="adham-side" aria-label="Adham profile panel">
        <div id="adhamBurstTarget" class="adham-photo-wrap" role="button" tabindex="0" aria-label="Activate fire ring effect">
          <img src="assets/adham pic.jpg" alt="Adham" class="adham-photo" loading="lazy" decoding="async" draggable="false" />
          <img src="assets/Secretariat frame.png" alt="" class="adham-frame" loading="lazy" decoding="async" aria-hidden="true" draggable="false" />
          <div id="adhamFireLayer" class="adham-fire-layer" aria-hidden="true"></div>
        </div>
        <p class="adham-caption">Tough IT guy right there.</p>
      </aside>
    </div>
  </main>

  <footer class="portal-footer">Made with love by the IT Team (Adham) ❤️</footer>

  <aside id="cookieBanner" class="cookie-banner" hidden>
    <p>We use essential cookies/local storage to keep your login active for up to 1 day.</p>
    <div class="cookie-actions">
      <button id="cookieRejectBtn" type="button" class="cookie-btn ghost">Not now</button>
      <button id="cookieAcceptBtn" type="button" class="cookie-btn">Accept</button>
    </div>
  </aside>

  <script src="tracker.js"></script>
  <script src="auth.js"></script>
  <script src="access.js"></script>
</body>
</html>
