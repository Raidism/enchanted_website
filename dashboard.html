<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Analytics Portal | Imperium MUN</title>
  <meta name="description" content="Imperium MUN analytics portal." />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Imperium MUN" />
  <meta property="og:title" content="Analytics Portal | Imperium MUN" />
  <meta property="og:description" content="Website analytics portal for Imperium MUN." />
  <meta property="og:image" content="assets/imperium mun logo.jpg" />
  <meta property="og:image:alt" content="Imperium MUN official logo" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Analytics Portal | Imperium MUN" />
  <meta name="twitter:description" content="Website analytics portal for Imperium MUN." />
  <meta name="twitter:image" content="assets/imperium mun logo.jpg" />
  <link rel="icon" type="image/jpeg" href="assets/imperium mun logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <header class="dash-header">
    <div class="header-inner">
      <a class="brand" href="index.html">IMPERIUM MUN</a>
      <div class="header-actions">
        <a href="#analytics">Analytics</a>
        <a href="ops.html">Ops Center</a>
        <a href="waitlist.html">Early Access</a>
        <a href="applications.html">Applications</a>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <!-- Welcome Hero -->
    <div class="dash-welcome-hero" id="dashWelcomeHero" aria-label="Welcome briefing">
      <div class="dwh-photo-col" aria-hidden="true">
        <div class="dwh-photo-ring">
          <img id="dwhPhoto" src="assets/imperium mun logo.jpg" alt="" class="dwh-photo" loading="eager" decoding="async" />
        </div>
      </div>
      <div class="dwh-text-col">
        <p class="dwh-eyebrow">IMPERIUM&nbsp;MUN &mdash; SECURE&nbsp;PORTAL</p>
        <h2 class="dwh-welcome-line" aria-live="polite">Welcome,&nbsp;<span class="dwh-name" id="dwhName"></span><span class="dwh-cursor" aria-hidden="true">█</span></h2>
        <p class="dwh-role" id="dwhRole"></p>
        <div class="dwh-briefing" id="dwhBriefing" aria-live="polite"></div>
      </div>
    </div>


    <section id="analytics" class="section">
      <h1>Website Analytics</h1>
      <div class="stats-grid">
        <article class="stat-card">
          <h3>Total Views</h3>
          <p id="totalViews">0</p>
        </article>
        <article class="stat-card">
          <h3>Unique IPs</h3>
          <p id="uniqueIps">0</p>
        </article>
        <article class="stat-card">
          <h3>Countries</h3>
          <p id="uniqueCountries">0</p>
        </article>
        <article class="stat-card">
          <h3>Lines of Code</h3>
          <p id="totalLines">&mdash;</p>
        </article>
      </div>

      <div class="table-card">
        <h2>Recent Visitors</h2>
        <div class="table-wrap">
          <table>
    
      <article class="table-card">
        <h3>📝 Leave a Note for IT</h3>
        <p class="sub">Flag changes, requests, or anything needing IT attention.</p>
        <form id="submitNoteForm" class="stack-form" novalidate>
          <label for="noteMessage">Your message</label>
          <textarea id="noteMessage" name="noteMessage" rows="4" placeholder="Describe what needs attention…"></textarea>
          <label for="notePriority">Priority</label>
          <select id="notePriority" name="notePriority">
            <option value="normal">⚪ Normal</option>
            <option value="urgent">🚨 Urgent</option>
          </select>
          <p id="submitNoteMessage" class="form-message" aria-live="polite"></p>
          <button type="submit">Submit Note</button>
        </form>
      </article>
    </section>

  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="tracker.js"></script>
  <script src="auth.js"></script>
  <script src="dashboard.js"></script>
</body>
</html>
