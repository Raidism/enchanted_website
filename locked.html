<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Locked Access | Imperium MUN</title>
  <meta name="description" content="Restricted access notice for Imperium MUN portal members." />
  <link rel="icon" type="image/jpeg" href="assets/imperium mun logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="dashboard.css" />
</head>
<body>
  <header class="dash-header">
    <div class="header-inner">
      <a class="brand" href="index.html">IMPERIUM MUN</a>
      <div class="header-actions">
        <a href="dashboard.html">Analytics</a>
        <a href="ops.html" data-locked-feature="ops">Ops Center</a>
        <a href="waitlist.html">Early Access</a>
        <a href="applications.html">Applications</a>
        <a href="settings.html" data-locked-feature="settings">Settings</a>
        <button id="logoutBtn" type="button">Logout</button>
      </div>
    </div>
  </header>

  <main class="dash-main">
    <div class="page-mini-hero" id="pageMiniHero" aria-label="Profile briefing">
      <div class="pmh-photo-ring" aria-hidden="true">
        <img id="pmhPhoto" src="assets/imperium mun logo.jpg" alt="" class="pmh-photo" loading="eager" decoding="async" />
      </div>
      <div class="pmh-text">
        <p class="pmh-eyebrow">IMPERIUM MUN PORTAL</p>
        <h2 class="pmh-name" id="pmhName">Organizer</h2>
        <p class="pmh-role" id="pmhRole">Member</p>
      </div>
    </div>

    <section class="section">
      <article class="table-card locked-card">
        <p class="locked-icon">🔒</p>
        <h1 id="lockedTitle" class="locked-title">This page is locked for your account</h1>
        <p id="lockedMessage" class="sub locked-message">
          You do not currently have permission to access this section.
        </p>
        <a id="backLink" href="dashboard.html" class="action-emoji-btn locked-back-link">Back to Analytics</a>
      </article>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="auth.js"></script>
  <script src="locked.js"></script>
</body>
</html>
