<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <title>Contact Adham | Imperium MUN</title>

  <link rel="icon" type="image/jpeg" href="assets/imperium mun logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

<body>
  <header class="contact-header">
    <div class="contact-header-inner">
      <a class="contact-brand" href="index.html">IMPERIUM MUN</a>
      <a class="contact-back" href="index.html">Back to Website</a>
    </div>
  </header>

  <main class="contact-main">
    <section class="contact-hero" id="contactHero">
      <p class="contact-eyebrow">Professional Web Experience</p>
      <h1>Contact Adham</h1>
      <p class="contact-subtitle">If you want a professionally built website for your MUN, reach out directly and let us craft it beautifully for your organization.</p>

      <div class="contact-card" id="contactCard">
        <div id="adhamBurstTarget" class="contact-photo-wrap" role="button" tabindex="0" aria-label="Activate fire ring effect">
          <img src="assets/adham pic.jpg" alt="Adham" class="contact-photo" loading="eager" decoding="async" />
          <img src="assets/Secretariat frame.png" alt="" class="contact-frame" loading="eager" decoding="async" />

        </div>

        <div class="contact-lines">
          <a class="contact-line" href="mailto:adhamsoliman118@gmail.com">
            <span class="label">Email</span>
            <span class="value">adhamsoliman118@gmail.com</span>
          </a>

          <a class="contact-line" href="tel:+966543262890">
            <span class="label">Phone</span>
            <span class="value">0543262890</span>
          </a>

          <a class="contact-line" href="https://wa.me/966543262890" target="_blank" rel="noopener noreferrer">
            <span class="label">WhatsApp</span>
            <span class="value">+966 54 326 2890</span>
          </a>

          <a class="contact-line" href="https://www.instagram.com/nxmpps/" target="_blank" rel="noopener noreferrer">
            <span class="label">Instagram</span>
            <span class="value">@nxmpps</span>
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="scripts/contact-adham.js"></script>
